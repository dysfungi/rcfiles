---
# https://pre-commit.com/hooks.html
x-anchors:
  excludes:
    # https://pre-commit.com/#regular-expressions
    - &fixes_exclude |-
      (?x)^(
        \.symlinked/.*
        |dot_config/configstore/.*\.json
        |dot_config/.*karabiner/.*\.json
        |modify_private_dot_claude.json
      )$

ci:
  autoupdate_commit_msg: "chore(pre-commit): Auto-update repo revisions"

repos:
  ###########
  # GENERAL #
  ###########

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: |-
          (?x)^(
            modify_private_dot_claude.json
          )$
      - id: check-merge-conflict
      - id: check-toml
      - id: end-of-file-fixer
        exclude: *fixes_exclude
      - id: sort-simple-yaml
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
        types_or: [css, html, json, markdown, yaml]
        exclude: *fixes_exclude
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.33.0
    hooks:
      - id: check-jsonschema
        name: validate mcp-servers.yaml
        files: ^\.chezmoidata/mcp-servers\.yaml$
        args: ["--schemafile", ".schemas/mcp-servers.schema.yaml"]
      - id: check-jsonschema
        name: validate models.yaml
        files: ^\.chezmoidata/models\.yaml$
        args: ["--schemafile", ".schemas/models.schema.yaml"]
      - id: check-jsonschema
        name: validate packages.yaml
        files: ^\.chezmoidata/packages\.yaml$
        args: ["--schemafile", ".schemas/packages.schema.yaml"]
      - id: check-jsonschema
        name: validate projects.yaml
        files: ^\.chezmoidata/projects\.yaml$
        args: ["--schemafile", ".schemas/projects.schema.yaml"]

  ######
  # F# #
  ######

  - repo: local
    hooks:
      - id: fantomas
        name: dotnet fantomas
        language: system
        entry: dotnet fantomas
        types: [file]
        files: \.(fs|fsx)$

      - id: validate-chezmoi-templates
        name: validate chezmoi templates (render + syntax check)
        language: script
        entry: .hooks/validate-chezmoi-templates.py
        files: |-
          (?x)(
            \.tmpl$
            |^\.chezmoitemplates/
          )
        pass_filenames: true
        stages: [pre-commit, pre-push]
        exclude: |-
          (?x)^(
            exact_private_dot_secrets/
            |(.*/)?symlink_
            |(.*/)?\.chezmoitemplates/ollama/Modelfile\.tmpl
          )$

  #######
  # LUA #
  #######

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      - id: stylua # or stylua-system / stylua-github

  ###########
  # PYTHON #
  ###########

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # https://docs.astral.sh/ruff/integrations/#pre-commit
    rev: "v0.12.2" # Ruff version.
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.16.1" # Use the sha / tag you want to point at
    hooks:
      - id: mypy
        # args:
        #   - "--ignore-missing-imports"
        #   - "--explicit-package-bases"
        #   - "--scripts-are-modules"
        additional_dependencies: []

  #########
  # SHELL #
  #########

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        exclude: ^\.zsh/

  - repo: https://github.com/maxwinterstein/shfmt-py
    rev: v3.12.0.1
    hooks:
      - id: shfmt
        exclude: ^\.zsh/
