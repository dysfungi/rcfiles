---
# https://pre-commit.com/hooks.html
#
# POLICY: hooks are the contract; files must conform to hooks — not the other way around.
# Do NOT exclude files, skip hooks, or add workarounds to silence failures without explicit
# user approval. When a hook fails on a file, fix the file. The only legitimate per-hook
# excludes are for files that are structurally incompatible (e.g. binary-like JSON, vendored
# files in .symlinked/) — not files that merely fail formatting checks.
x-anchors:
  excludes:
    # https://pre-commit.com/#regular-expressions
    - &fixes_exclude |-
      (?x)^(
        \.symlinked/.*
        |dot_config/configstore/.*\.json
        |dot_config/.*karabiner/.*\.json
        |modify_private_dot_claude.json
      )$

ci:
  autoupdate_commit_msg: "chore(pre-commit): Auto-update repo revisions"

repos:
  ###########
  # GENERAL #
  ###########

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: |-
          (?x)^(
            modify_private_dot_claude.json
          )$
      - id: check-merge-conflict
      - id: check-toml
      - id: end-of-file-fixer
        exclude: *fixes_exclude
      - id: sort-simple-yaml
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        # identify classifies .yamllint as YAML, but its extension has no Prettier parser.
        entry: prettier --write --ignore-unknown
        additional_dependencies: ["prettier@3.9.5"]
        types_or: [css, html, json, markdown, yaml]
        exclude: *fixes_exclude
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.33.0
    hooks:
      - id: check-jsonschema
        name: validate mcp-servers.yaml
        files: ^\.chezmoidata/mcp-servers\.yaml$
        args: ["--schemafile", ".schemas/mcp-servers.schema.yaml"]
      - id: check-jsonschema
        name: validate large-language-models.yaml
        files: ^\.chezmoidata/large-language-models\.yaml$
        args: ["--schemafile", ".schemas/large-language-models.schema.yaml"]
      - id: check-jsonschema
        name: validate packages.yaml
        files: ^\.chezmoidata/packages\.yaml$
        args: ["--schemafile", ".schemas/packages.schema.yaml"]
      - id: check-jsonschema
        name: validate projects.yaml
        files: ^\.chezmoidata/projects\.yaml$
        args: ["--schemafile", ".schemas/projects.schema.yaml"]

  ######
  # F# #
  ######

  - repo: local
    hooks:
      - id: fantomas
        name: dotnet fantomas
        language: system
        entry: dotnet fantomas
        types: [file]
        files: \.(fs|fsx)$

      - id: validate-chezmoi-templates
        name: validate chezmoi templates (render + syntax check)
        language: script
        entry: .hooks/validate-chezmoi-templates.py
        files: |-
          (?x)(
            \.tmpl$
            |^\.chezmoitemplates/
          )
        pass_filenames: true
        # Serialize: parallel chezmoi execute-template runs walk the repo tree while
        # sibling workers churn temp dirs under .tmp/chezmoi-validate/ (readdir->lstat
        # TOCTOU -> spurious "no such file or directory"). One process at a time avoids it.
        require_serial: true
        stages: [pre-commit, pre-push]
        exclude: |-
          (?x)^(
            exact_private_dot_secrets/
            |(.*/)?symlink_
            |(.*/)?\.chezmoitemplates/ollama/Modelfile\.tmpl
          )$

      - id: pytest
        name: pytest (fast)
        language: system
        entry: uv run --group test pytest .tests/ -m "not slow" --tb=short -q
        pass_filenames: false
        always_run: true

      - id: pytest-integration
        name: pytest (all, including slow)
        language: system
        entry: uv run --group test pytest .tests/ --tb=short -q
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  #######
  # LUA #
  #######

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      - id: stylua # or stylua-system / stylua-github

  ###########
  # PYTHON #
  ###########

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # https://docs.astral.sh/ruff/integrations/#pre-commit
    rev: "v0.12.2" # Ruff version.
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        exclude: \.tmpl$
      - id: ruff-format
        exclude: \.tmpl$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.16.1" # Use the sha / tag you want to point at
    hooks:
      - id: mypy
        # args:
        #   - "--ignore-missing-imports"
        #   - "--explicit-package-bases"
        #   - "--scripts-are-modules"
        # types-PyYAML supplies stubs for `import yaml` used in the skill
        # frontmatter test; without it mypy reports import-untyped.
        additional_dependencies: ["types-PyYAML"]
        exclude: \.tmpl$

  #########
  # SHELL #
  #########

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        exclude: ^\.zsh/

  - repo: https://github.com/maxwinterstein/shfmt-py
    rev: v3.12.0.1
    hooks:
      - id: shfmt
        exclude: ^\.zsh/
