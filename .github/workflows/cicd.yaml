---
name: Continuous Integration & Deployment

"on":
  push:
    branches:
      - main
  pull_request:

permissions: read-all

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - run: pre-commit run --all-files --hook-stage manual --show-diff-on-failure --color=always

  tmux-direct-shell:
    name: tmux direct shell (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
          - name: MSYS2/Git Bash
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install tmux on macOS
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: Install tmux on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes tmux
      - name: Set up mise
        if: runner.os != 'Windows'
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            tmux
            python
            python-pip
            chezmoi
      - name: Run direct-shell and mail regressions
        if: runner.os != 'Windows'
        run: mise x -- uv run --locked --group test pytest .tests/tmux/test_direct_shell.py .tests/xonsh/test_mail.py -v
      - name: Run direct-shell and mail regressions in MSYS2
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python -m pip install --disable-pip-version-check uv
          uv run --locked --group test pytest .tests/tmux/test_direct_shell.py .tests/xonsh/test_mail.py -v
