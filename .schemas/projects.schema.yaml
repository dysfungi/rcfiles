# JSON Schema for .chezmoidata/projects.yaml
# Validated via pre-commit hook: check-jsonschema
$schema: https://json-schema.org/draft/2020-12/schema

type: object
additionalProperties: false
required: [my]
properties:
  my:
    $ref: "#/$defs/namespace"
  riot:
    $ref: "#/$defs/namespace"

$defs:
  namespace:
    type: object
    additionalProperties: false
    required: [projects]
    properties:
      projects:
        type: array
        items:
          $ref: "#/$defs/project"

  project:
    type: object
    additionalProperties: false
    required: [path]
    properties:
      path:
        type: string
      is_home_relative:
        type: boolean
      perforce:
        type: boolean
      p4:
        type: object
        additionalProperties: false
        required: [port, stream, virtual_stream]
        properties:
          port:
            type: string
            minLength: 1
          stream:
            type: string
            minLength: 1
          virtual_stream:
            type: object
            additionalProperties: false
            required: [name, ignored_extensions]
            properties:
              name:
                type: string
                minLength: 1
              ignored_extensions:
                type: array
                minItems: 1
                uniqueItems: true
                items:
                  type: string
      only_on:
        type: array
        uniqueItems: true
        items:
          type: string
          enum: [wsl, linux, darwin, windows]
