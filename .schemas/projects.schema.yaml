# JSON Schema for .chezmoidata/projects.yaml
# Validated via pre-commit hook: check-jsonschema
$schema: https://json-schema.org/draft/2020-12/schema

type: object
additionalProperties: false
required: [my]
properties:
  my:
    $ref: "#/$defs/namespace"
  riot:
    $ref: "#/$defs/namespace"

$defs:
  namespace:
    type: object
    additionalProperties: false
    required: [projects]
    properties:
      projects:
        type: array
        items:
          $ref: "#/$defs/project"

  project:
    type: object
    additionalProperties: false
    required: [path]
    properties:
      path:
        type: string
      is_home_relative:
        type: boolean
      perforce:
        type: boolean
      only_on:
        type: array
        uniqueItems: true
        items:
          type: string
          enum: [wsl, linux, darwin, windows]
