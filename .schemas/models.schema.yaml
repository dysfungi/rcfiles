# JSON Schema for .chezmoidata/models.yaml
# Validated via pre-commit hook: check-jsonschema
$schema: https://json-schema.org/draft/2020-12/schema

type: object
additionalProperties: false
required: [my]
properties:
  my:
    $ref: "#/$defs/namespace"

$defs:
  namespace:
    type: object
    additionalProperties: false
    required: [models]
    properties:
      defaultModelParameters:
        $ref: "#/$defs/modelParameters"
      models:
        type: object
        additionalProperties:
          $ref: "#/$defs/model"

  model:
    type: object
    additionalProperties: false
    required: [enabled]
    properties:
      enabled:
        type: boolean
      parameters:
        $ref: "#/$defs/modelParameters"

  modelParameters:
    type: object
    additionalProperties: false
    properties:
      num_ctx:
        type: integer
        minimum: 1
      num_predict:
        type: integer
        minimum: -1
      temperature:
        type: number
        minimum: 0
        maximum: 2
