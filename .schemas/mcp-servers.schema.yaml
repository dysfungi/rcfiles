# JSON Schema for .chezmoidata/mcp-servers.yaml
# Validated via pre-commit hook: check-jsonschema
$schema: https://json-schema.org/draft/2020-12/schema

type: object
additionalProperties: false
required: [my]
properties:
  my:
    $ref: "#/$defs/namespace"
  riot:
    $ref: "#/$defs/namespace"

$defs:
  namespace:
    type: object
    additionalProperties: false
    required: [mcpServers]
    properties:
      mcpServers:
        type: object
        additionalProperties:
          $ref: "#/$defs/mcp_server"

  mcp_server:
    type: object
    required: [docUrl]
    oneOf:
      - title: http
        required: [serverUrl]
        additionalProperties: false
        properties:
          docUrl:
            type: string
            format: uri
          serverUrl:
            type: string
            format: uri
          auth:
            $ref: "#/$defs/auth"
          env:
            $ref: "#/$defs/env_vars"
          spoofs:
            $ref: "#/$defs/spoofs"
      - title: uvx
        required: [uvx]
        additionalProperties: false
        properties:
          docUrl:
            type: string
            format: uri
          uvx:
            type: object
            required: [package]
            additionalProperties: false
            properties:
              package:
                type: string
              args:
                type: array
                items:
                  type: string
          env:
            $ref: "#/$defs/env_vars"
          env_tmpl:
            type: string

  env_vars:
    type: object
    additionalProperties:
      type: string

  # Per-server client-identity spoofs for vendors that gate OAuth dynamic
  # client registration on an exact client_name allowlist. Each entry binds a
  # spoofed identity to one or more tools.
  #
  # SUPPORT IS NOT AUTOMATIC: a tool is spoofed only if (a) it is listed in
  # `tools` (or `all`) AND (b) its own template implements spoof handling.
  # Adding a new tool therefore requires BOTH extending the `tools` enum below
  # AND wiring that tool's template to read `spoofs`. `all` applies to every
  # tool that currently implements support (today: pi only).
  spoofs:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [tools, oauth_client_name]
      properties:
        tools:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            enum: [all, pi]
        oauth_client_name:
          type: string

  auth:
    type: object
    additionalProperties: false
    required: [type, opPath]
    properties:
      type:
        type: string
        enum: [bearer]
      opPath:
        type: string
        pattern: "^op://"
