# JSON Schema for .chezmoidata/mcp-servers.yaml
# Validated via pre-commit hook: check-jsonschema
$schema: https://json-schema.org/draft/2020-12/schema

type: object
additionalProperties: false
required: [my]
properties:
  my:
    $ref: "#/$defs/namespace"
  riot:
    $ref: "#/$defs/namespace"

$defs:
  namespace:
    type: object
    additionalProperties: false
    required: [mcpServers]
    properties:
      mcpServers:
        type: object
        additionalProperties:
          $ref: "#/$defs/mcpServer"

  mcpServer:
    type: object
    required: [docUrl]
    oneOf:
      - title: http
        required: [serverUrl]
        additionalProperties: false
        properties:
          docUrl:
            type: string
            format: uri
          serverUrl:
            type: string
            format: uri
          auth:
            $ref: "#/$defs/auth"
          env:
            $ref: "#/$defs/envVars"
      - title: uvx
        required: [uvx]
        additionalProperties: false
        properties:
          docUrl:
            type: string
            format: uri
          uvx:
            type: object
            required: [package]
            additionalProperties: false
            properties:
              package:
                type: string
              args:
                type: array
                items:
                  type: string
          env:
            $ref: "#/$defs/envVars"
          envProfile:
            type: string

  envVars:
    type: object
    additionalProperties:
      type: string

  auth:
    type: object
    additionalProperties: false
    required: [type, opPath]
    properties:
      type:
        type: string
        enum: [bearer]
      opPath:
        type: string
        pattern: "^op://"
