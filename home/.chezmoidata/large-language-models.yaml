---
# Central source of truth for every LLM this repo configures. All harnesses
# (pi, omp, codex, claude, agy, ollama) DERIVE their native config from this catalog
# so a model is declared once and funnels everywhere.
#
# For TrueFoundry-routed models, verify and refresh context windows, pricing, and
# reasoning levels with TrueFoundry's list-models API—not scraped public provider
# documentation: https://www.truefoundry.com/docs/apply-api-create-models#list-models
#
# Per-model fields (generic — no tool-prefixed keys):
#   id           canonical model id (as the gateway/provider expects it)
#   vendor       maker: anthropic | openai | google  (harness-compat filter)
#   alias        optional CLI handle; claude reads opus/sonnet/haiku
#   display_name optional pi picker label; else derived from id
#   gateway      *anchor (id/provider/name/base_url/api/api_key_op/routed_via_gateway);
#                omit for built-ins (pi provider then = vendor). `id` is the stable
#                logical gateway identifier used where a harness needs its own provider
#                name. Custom-provider entries may still target a direct vendor endpoint,
#                so `routed_via_gateway` distinguishes actual gateway routing.
#   reasoning,ctx,max_tokens,cost,one_m,adaptive   pi catalog facts
#                (ctx/max_tokens/cost required by pi for ENABLED gateway models)
#   thinking_level_map complete Pi logical-level map for reasoning models:
#                all seven keys (off/minimal/low/medium/high/xhigh/max) are
#                required; null hides an unsupported level. Values are native
#                provider control values. Direct Google maps are capability-only:
#                Pi translates their selected logical level to Google's value.
#   enabled      appears in pi's catalog + rotation (list order = cycling order)
#   default_for  subset of [pi, codex, claude, agy] this model is the default for
#                (each harness may appear in at most one entry — guarded at render)
#   roles        shared pi + omp role assignments. Pi roles: scout, planner,
#                reviewer, worker. Omp roles: default, smol, slow, plan, commit,
#                vision, designer, tiny, task, advisor. Entries may add an
#                :effort suffix (minimal|low|medium|high|xhigh|max), meaningful
#                only to omp. Pi roles must never use a suffix; the catalog schema
#                rejects it. Zero enabled models for a role is valid: consumers
#                omit it. Two or more enabled models for the same base role fail
#                validation because the assignment is ambiguous.
#   default_for  unrelated single default for pi, codex, claude, or agy; unchanged
#                by roles and guarded independently
#
# default_for: [agy] is DECLARED intent only — validated by the guard but not yet
# consumed: Antigravity CLI exposes no settings.json default-model key (only the
# per-session --model flag / agy-managed LastSelectedModel state), so there is
# nothing to render. Wire it once agy gains a config key. See todo.txt.
#
# Note: claude reads alias mappings regardless of `enabled`, so a dormant model
# (e.g. haiku) can still back claude's HAIKU alias while staying out of pi.

# Shared cross-harness reasoning-effort default. Pi consumes it today; Codex,
# Claude, and Gemini retain separate settings until they opt in.
default_thinking_level: high

x: # YAML anchors only — NOT machine data (docker-compose `x-` convention).
  default_model_parameters: &default_model_parameters
    num_ctx: &defaultNumCtx 16384 # Force the context window to 16k tokens (leaves safe overhead for your 18GB RAM)
    num_predict: &defaultNumPredict 2048 # Dictate output budget per individual turn
    temperature: &defaultTemperature 0.2 # Lower temperature slightly for strict, deterministic code syntax generation
  thinking_level_maps:
    # All maps are complete so missing keys cannot silently advertise support.
    # GPT-5.6's native `none` maps to Pi's logical `off`; it has no `minimal` effort.
    openai_gpt_5_6: &thinking_openai_gpt_5_6
      "off": none
      minimal: null
      low: low
      medium: medium
      high: high
      xhigh: xhigh
      max: max
    anthropic_standard: &thinking_anthropic_standard
      "off": disabled
      minimal: low
      low: low
      medium: medium
      high: high
      xhigh: null
      max: null
    anthropic_opus_4_6: &thinking_anthropic_opus_4_6
      "off": disabled
      minimal: low
      low: low
      medium: medium
      high: high
      xhigh: null
      max: max
    anthropic_premium: &thinking_anthropic_premium
      "off": disabled
      minimal: low
      low: low
      medium: medium
      high: high
      xhigh: xhigh
      max: max
    google_pro: &thinking_google_pro
      "off": null
      minimal: null
      low: LOW
      medium: null
      high: HIGH
      xhigh: null
      max: null
    google_flash: &thinking_google_flash
      "off": null
      minimal: MINIMAL
      low: LOW
      medium: MEDIUM
      high: HIGH
      xhigh: null
      max: null
    google_pro_openai: &thinking_google_pro_openai
      "off": null
      minimal: null
      low: low
      medium: null
      high: high
      xhigh: null
      max: null
    google_flash_openai: &thinking_google_flash_openai
      "off": null
      minimal: minimal
      low: low
      medium: medium
      high: high
      xhigh: null
      max: null
  gateways:
    truefoundry-anthropic:
      &tf_anthropic # OMP selects Vertex-safe Anthropic request shaping by provider ID.
      id: google-vertex
      provider: truefoundry
      name: TrueFoundry (Riot)
      base_url: &tf_base "https://truefoundry.riotgames.io/api/llm"
      api: anthropic-messages
      api_key_op: &tf_key "op://Riot/TrueFoundry - Personal Access Token/credential"
      routed_via_gateway: true
    truefoundry-openai: &tf_openai
      id: truefoundry-openai
      # same TF endpoint, OpenAI wire — serves openai/* AND google-vertexai/*
      # provider MUST be the built-in id `openai`, not a custom name: pi's
      # `OPENAI_API_KEY` env var (set globally for codex) auto-activates the
      # built-in `openai` provider @ api.openai.com and OUTRANKS custom providers
      # (env > models.json in pi's resolution order), so a custom name gets
      # shadowed → 401 invalid_issuer. Keying it `openai` overrides the built-in
      # provider to point at TF instead (pi's built-in-provider override).
      provider: openai
      name: TrueFoundry OpenAI (Riot)
      base_url: *tf_base
      # openai-responses (not -completions): gpt-5.6 rejects tools+reasoning on
      # /v1/chat/completions (needs /v1/responses); gemini works on it too.
      api: openai-responses
      api_key_op: *tf_key
      routed_via_gateway: true
    google: &google # personal, direct to Google
      id: google
      provider: google
      name: Google Gemini
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      api: google-generative-ai
      api_key_op: "op://CLI/Gemini API Key - Frankish/credential"
      routed_via_gateway: false

my:
  llm:
    ollama: # local runtime models (built by the modelfile-generation script)
      models:
        "codestral:22b":
          enabled: false
          parameters: *default_model_parameters
        "deepseek-r1:14b":
          enabled: false
          parameters: *default_model_parameters
        "gemma4:e4b":
          enabled: false
          parameters: *default_model_parameters
        "phi4:14b":
          enabled: false
          parameters: *default_model_parameters
        "qwen2.5-coder:14b-instruct-q4_K_M":
          enabled: false
          parameters: *default_model_parameters
        "qwen3-coder-next:q4_K_M":
          enabled: true
          parameters: *default_model_parameters
        "qwen3.5:9b":
          enabled: false
          parameters:
            num_ctx: 24576
            num_predict: *defaultNumPredict
            temperature: 0.1
    models: # order = pi enabledModels cycling order
      - id: claude-opus-4-8
        vendor: anthropic
        alias: opus
        enabled: true
        default_for: [pi]
        roles: [planner, worker]
      - id: claude-sonnet-5
        vendor: anthropic
        alias: sonnet
        enabled: true
        roles: [scout, reviewer]
      - id: claude-fable-5
        vendor: anthropic
        enabled: true
      - id: gemini-3.1-pro-preview
        vendor: google
        gateway: *google
        display_name: Gemini 3.1 Pro
        reasoning: true
        thinking_level_map: *thinking_google_pro
        ctx: 1048576
        max_tokens: 65536
        cost:
          input: 2.0
          output: 12.0
          cache_read: 0.2
          cache_write: 0
        enabled: true
        default_for: [agy]
      - id: gemini-3.5-flash
        vendor: google
        gateway: *google
        display_name: Gemini 3.5 Flash
        reasoning: true
        thinking_level_map: *thinking_google_flash
        ctx: 1048576
        max_tokens: 65536
        cost:
          input: 1.5
          output: 9.0
          cache_read: 0.15
          cache_write: 0
        enabled: true
      - id: gemini-3.1-flash-lite # personal: no -preview suffix
        vendor: google
        gateway: *google
        display_name: Gemini 3.1 Flash-Lite
        reasoning: true
        thinking_level_map: *thinking_google_flash
        ctx: 1048576
        max_tokens: 65536
        cost:
          input: 0.25
          output: 1.5
          cache_read: 0.025
          cache_write: 0
        enabled: true

riot:
  llm:
    models: # order = pi enabledModels cycling order
      # GPT-5.6 input/output rates are OpenAI-priced and cross-checked against
      # TrueFoundry; cache rates are OpenAI's 0.1x read / 1.25x write formula.
      # Prompts over 272K input tokens cost 2x input and 1.5x output for the full
      # request; this flat-rate schema does not model that surcharge.
      - id: openai/gpt-5.6-sol
        vendor: openai
        gateway: *tf_openai
        display_name: GPT-5.6 Sol
        reasoning: true
        thinking_level_map: *thinking_openai_gpt_5_6
        ctx: 1050000
        max_tokens: 128000
        cost:
          input: 5.0
          output: 30.0
          cache_read: 0.5
          cache_write: 6.25
        enabled: true
        roles: [default, "plan:high", planner]
      - id: openai/gpt-5.6-terra
        vendor: openai
        gateway: *tf_openai
        display_name: GPT-5.6 Terra
        reasoning: true
        thinking_level_map: *thinking_openai_gpt_5_6
        ctx: 1050000
        max_tokens: 128000
        cost:
          input: 2.5
          output: 15.0
          cache_read: 0.25
          cache_write: 3.125
        enabled: true
        default_for: [codex]
        roles: [reviewer, worker, task, "advisor:medium", "slow:high"]
      - id: openai/gpt-5.6-luna
        vendor: openai
        gateway: *tf_openai
        display_name: GPT-5.6 Luna
        reasoning: true
        thinking_level_map: *thinking_openai_gpt_5_6
        ctx: 1050000
        max_tokens: 128000
        cost:
          input: 1.0
          output: 6.0
          cache_read: 0.1
          cache_write: 1.25
        enabled: true
        roles: [scout, smol, commit]
      - id: claude-vertex/anthropic-claude-opus-4-8
        vendor: anthropic
        alias: opus
        gateway: *tf_anthropic
        display_name: Claude Opus 4.8
        reasoning: true
        thinking_level_map: *thinking_anthropic_premium
        ctx: 200000
        max_tokens: 32000
        one_m: true
        adaptive: true # Vertex rejects legacy thinking for opus 4.7+; force adaptive
        cost: &opus_cost
          input: 15
          output: 75
          cache_read: 1.5
          cache_write: 18.75
        enabled: true
        default_for: [claude, pi]
      - id: claude-vertex/anthropic-claude-sonnet-5
        vendor: anthropic
        alias: sonnet
        gateway: *tf_anthropic
        display_name: Claude Sonnet 5
        reasoning: true
        thinking_level_map: *thinking_anthropic_premium
        ctx: 200000
        max_tokens: 64000
        one_m: true
        adaptive: true
        cost:
          input: 3
          output: 15
          cache_read: 0.3
          cache_write: 3.75
        enabled: true
      - id: google-vertexai/gemini-3.1-pro-preview
        vendor: google
        gateway: *tf_openai
        display_name: Gemini 3.1 Pro
        reasoning: true
        thinking_level_map: *thinking_google_pro_openai
        ctx: 1048576
        max_tokens: 65536
        cost:
          input: 2.0
          output: 12.0
          cache_read: 0.2
          cache_write: 0
        enabled: true
        default_for: [agy]
        roles: ["vision:high"]
      - id: google-vertexai/gemini-3.5-flash
        vendor: google
        gateway: *tf_openai
        display_name: Gemini 3.5 Flash
        reasoning: true
        thinking_level_map: *thinking_google_flash_openai
        ctx: 1048576
        max_tokens: 65536
        cost:
          input: 1.5
          output: 9.0
          cache_read: 0.15
          cache_write: 0
        enabled: true
        roles: ["designer:high"]
      - id: google-vertexai/gemini-3.1-flash-lite-preview
        vendor: google
        gateway: *tf_openai
        display_name: Gemini 3.1 Flash-Lite
        reasoning: true
        thinking_level_map: *thinking_google_flash_openai
        ctx: 1048576
        max_tokens: 65536
        cost:
          input: 0.25
          output: 1.5
          cache_read: 0.025
          cache_write: 0
        enabled: true
        roles: ["tiny:minimal"]
      # Dormant below (enabled: false): ABSENT from pi's models.json + rotation and
      # thus unreachable via /model (re-enable by flipping the flag); haiku still
      # feeds claude via its alias. Kept here for quick re-enable + id/spec record.
      - id: claude-vertex/anthropic-claude-haiku-4-5-20251001
        vendor: anthropic
        alias: haiku # feeds claude's HAIKU alias even while dormant in pi
        gateway: *tf_anthropic
        reasoning: true
        thinking_level_map: *thinking_anthropic_standard
        ctx: 200000
        max_tokens: 64000
        cost:
          input: 1
          output: 5
          cache_read: 0.1
          cache_write: 1.25
        enabled: false
      - id: claude-vertex/anthropic-claude-opus-4-6
        vendor: anthropic
        gateway: *tf_anthropic
        display_name: Claude Opus 4.6
        reasoning: true
        thinking_level_map: *thinking_anthropic_opus_4_6
        ctx: 200000
        max_tokens: 32000
        one_m: true
        adaptive: false # opus 4.6 accepts both legacy and adaptive thinking
        cost: *opus_cost
        enabled: false
      - id: claude-vertex/anthropic-claude-opus-4-7
        vendor: anthropic
        gateway: *tf_anthropic
        display_name: Claude Opus 4.7
        reasoning: true
        thinking_level_map: *thinking_anthropic_premium
        ctx: 200000
        max_tokens: 32000
        one_m: true
        adaptive: true
        cost: *opus_cost
        enabled: false
