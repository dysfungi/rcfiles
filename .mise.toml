# https://mise.jdx.dev/configuration.html
# https://mise.jdx.dev/mise-cookbook/python.html#a-python-project-with-virtualenv

min_version = "2024.9.5"


[settings]

[env]
# https://mise.jdx.dev/environments/
PROJECT_NAME = "{{ config_root | basename }}"


[tools]
python = "{{ get_env(name='PYTHON_VERSION', default='3.13') }}"
"pipx:pre-commit" = "latest"
# chezmoi template validation (validate-chezmoi-templates pre-commit hook)
hadolint               = "latest"
jq                     = "latest"
lua                    = "latest"
"npm:markdownlint-cli" = "latest"
"pipx:yamllint"        = "latest"
shellcheck             = "latest"
shfmt                  = "latest"
stylua                 = "latest"
taplo                  = "latest"


[tasks]
# https://mise.jdx.dev/tasks/

[tasks.install]
description = "Install dependencies"
alias = "i"
run = "uv pip install --requirement=dot_default-python-packages"

[tasks.run]
description = "Run the application"
run = "python app.py"

[tasks.test]
description = "Run tests"
run = "pytest tests/"

[tasks.lint]
description = "Lint the code"
run = "pre-commit run --all-files --show-diff-on-failure"

[tasks.info]
description = "Print project information"
run = '''
echo "Project: $PROJECT_NAME"
echo "Virtual Environment: $VIRTUAL_ENV"
'''
