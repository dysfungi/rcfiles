# https://mise.jdx.dev/configuration.html
# https://mise.jdx.dev/mise-cookbook/python.html#a-python-project-with-virtualenv

min_version = "2024.9.5"


[settings]

[env]
# https://mise.jdx.dev/environments/
PROJECT_NAME = "{{ config_root | basename }}"


[tools]
python = "{{ get_env(name='PYTHON_VERSION', default='3.13') }}"
# Pi 0.80.6 requires Node >=22.19.0; pin the runtime used by its RPC regression.
node = "24.18.0"
"npm:@earendil-works/pi-coding-agent" = "0.80.6"
uv                     = "latest"
chezmoi                = "latest"
"pipx:pre-commit"      = "latest"
# chezmoi template validation (validate-chezmoi-templates pre-commit hook)
# github backend: aqua-registry expects old hadolint-Darwin-* asset names; current
# releases (2.14.0+) publish hadolint-macos-*. github reads GitHub assets directly.
# (ubi backend was deprecated in favor of github — removed in mise 2027.1.0.)
"github:hadolint/hadolint" = "latest"
jq                     = "latest"
lua                    = "latest"
"npm:markdownlint-cli" = "latest"
"pipx:yamllint"        = "latest"
shellcheck             = "latest"
# github backend: aqua registry looks for sha256sums.txt which mvdan/sh no longer
# publishes. bin= required because repo name (sh) differs from binary name (shfmt).
# (ubi backend was deprecated in favor of github — removed in mise 2027.1.0.)
"github:mvdan/sh" = { version = "latest", bin = "shfmt" }
stylua                 = "latest"
taplo                  = "latest"


[tasks]
# https://mise.jdx.dev/tasks/

[tasks.apply]
description = "Chezmoi apply"
run = "chezmoi apply --verbose"

[tasks.execute-template]
description = "Chezmoi execute-template"
run = "chezmoi --verbose execute-template --file"

[tasks.worktree-apply]
description = "chezmoi apply a target using THIS worktree as the source (a bare `chezmoi apply` reads the main checkout and ignores worktree edits)"
usage = 'arg "<target>" help="Chezmoi target path (e.g. ~/.config/nvim/init.lua) to apply from this worktree"'
run = 'chezmoi apply --source "$(git rev-parse --show-toplevel)" "${usage_target}"'

[tasks.test]
description = "Run tests"
run = "uv run --group test pytest .tests/ -v"

[tasks."test:durations"]
description = "Regenerate pytest duration data"
run = "uv run --group test pytest .tests/ --store-durations"

[tasks.lint]
description = "Lint the code"
run = "pre-commit run --all-files --hook-stage=manual --show-diff-on-failure"

[tasks.run]
description = "Chezmoi run script after rendering from template"
run = "TODO"

[tasks.update]
description = "Chezmoi update"
run = "chezmoi update --verbose"
