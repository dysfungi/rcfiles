set-option -g mode-keys vi
set -g pane-border-status top
set -g pane-border-format "#{?pane_active, #[fg=colour214 bold]#{pane_title}#[fg=default none] , #[fg=colour245 dim]#{pane_title}#[fg=default none] }"
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour214'
set -g pane-border-indicators arrows
set -g window-style 'fg=colour245,bg=colour235'
set -g window-active-style 'fg=default,bg=colour232'
set-option -g history-limit 100000
set-option -g default-shell "$SHELL"

# Darwin: spawn every pane/window through real login(1) — exactly like
# Terminal.app — so new panes print the "You have new mail." notice (the
# chezmoi-update-cron drift nag mailed to /var/mail/$USER) plus a utmpx record.
# - default-shell /bin/sh: tmux runs default-command via `default-shell -c`
#   (not sh -c); with xonsh as default-shell each pane would keep a resident
#   xonsh wrapper (~0.35s spawn cost). /bin/sh + `exec` collapses the wrapper.
# - login -pfl: -p preserves env (PATH/TERM); -f skips auth (same user, setuid
#   /usr/bin/login); -l is required because plain -pf chdirs to $HOME, breaking
#   the -c "#{pane_current_path}" splits below — -l preserves cwd and still
#   prints the mail notice. login execs the DS UserShell
#   (~/.local/xonsh-env/bin/xonsh, not wezterm's xbin wrapper — functionally
#   identical), so panes still land in xonsh.
# - "$USER" is expanded by tmux when if-shell parses the line — same value as
#   runtime expansion would give.
# - Darwin-only: util-linux login(1) is not setuid (root-only), so Linux keeps
#   default-shell "$SHELL" and gets the notice from shell-level checks instead
#   (zsh MAIL/startup module, xonsh pre-prompt check).
# - Side effect: darwin `new-window 'cmd'` strings now run via `sh -c` instead
#   of `xonsh -c` (standard).
if-shell 'test "$(uname)" = Darwin' 'set -g default-shell /bin/sh ; set -g default-command "exec login -pfl \"$USER\""'

# https://wezterm.org/shell-integration.html#user-vars
set -g allow-passthrough on

# pi (pi.dev): forward modified keys (Shift/Ctrl/Alt+Enter) in csi-u form. Requires tmux 3.5+.
# extended-keys controls only the tmux->app (output) leg. For tmux to RECEIVE a
# distinguishable Ctrl/Shift+Enter on the terminal->tmux (input) leg, the outer
# terminal must advertise the `extkeys` feature; otherwise wezterm collapses
# Ctrl+Enter to a bare CR before tmux ever sees it. tmux's built-in feature sets
# (xterm*/screen*/rxvt*) do NOT include extkeys, and our wezterm uses
# `config.term = "wezterm"` (client_termname=wezterm), so we must add it explicitly.
set -as terminal-features 'wezterm:extkeys'
set -g extended-keys on
set -g extended-keys-format csi-u

bind-key c new-window -c "#{pane_current_path}"
bind-key \" split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# Colemak pane movement shortcuts (same as vim)
unbind-key h
bind-key h select-pane -L
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key l
bind-key l select-pane -R

# Ctrl-t ([t]mux) as an intuitive alternative to Ctrl-b
# set -g prefix C-t
# bind-key C-t send-prefix
# unbind-key C-b

# Kill pane and its entire process tree recursively (shell -> nvim -> LSP servers, etc.)
# Uses a recursive shell function to handle arbitrary depth (avoids fixed-level pgrep passes
# that miss grandchildren like tflint spawned by nvim's lspconfig).
bind-key x confirm-before -p "kill-pane? (y/n)" "run-shell 'f(){ for c in \$(pgrep -P \"\$1\" 2>/dev/null); do f \"\$c\"; done; kill -9 \"\$1\" 2>/dev/null; }; f #{pane_pid}' \; kill-pane"

# Default session layout (auto-launched session setup)
new-session -d -s main -n scratch
new-window -d -t main:8 -n caffeine
new-window -d -t main:9 -n chezmoi -c "$HOME/.local/share/chezmoi"
