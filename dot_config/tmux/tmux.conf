set-option -g mode-keys vi
set -g pane-border-status top
set -g pane-border-format "#{?pane_active, #[fg=colour214 bold]#{pane_title}#[fg=default none] , #[fg=colour245 dim]#{pane_title}#[fg=default none] }"
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour214'
set -g pane-border-indicators arrows
set -g window-style 'fg=colour245,bg=colour235'
set -g window-active-style 'fg=default,bg=colour232'
set-option -g history-limit 100000
set-option -g default-shell "$SHELL"

# https://wezterm.org/shell-integration.html#user-vars
set -g allow-passthrough on

bind-key c new-window -c "#{pane_current_path}"
bind-key \" split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# Colemak pane movement shortcuts (same as vim)
unbind-key h
bind-key h select-pane -L
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key l
bind-key l select-pane -R

# Ctrl-t ([t]mux) as an intuitive alternative to Ctrl-b
# set -g prefix C-t
# bind-key C-t send-prefix
# unbind-key C-b

# Kill pane and its entire process tree recursively (shell -> nvim -> LSP servers, etc.)
# Uses a recursive shell function to handle arbitrary depth (avoids fixed-level pgrep passes
# that miss grandchildren like tflint spawned by nvim's lspconfig).
bind-key x confirm-before -p "kill-pane? (y/n)" "run-shell 'f(){ for c in \$(pgrep -P \"\$1\" 2>/dev/null); do f \"\$c\"; done; kill -9 \"\$1\" 2>/dev/null; }; f #{pane_pid}' \; kill-pane"

# Default session layout (auto-launched session setup)
new-session -d -s main -n scratch
new-window -d -t main:8 -n caffeine
new-window -d -t main:9 -n chezmoi -c "$HOME/.local/share/chezmoi"
