# .chezmoidata/packages.yaml
#
# Single source of truth for all managed packages across platforms.
#
# Namespaces:
#   my.packages   — personal + shared
#   riot.packages — Riot Games work machine additions (merged when isRiotMachine)
#
# Each entry is a YAML map keyed by canonical package name. Values are objects
# with one or more package manager fields. Templates filter on key presence
# (eg, hasKey $pkg "brew"). Go templates iterate maps in sorted key order.
#
# Package manager fields (all optional; include only those that apply):
#   brew         — Homebrew formula name
#   brew_options — extra Brewfile options (eg, "restart_service: :changed")
#   cask         — Homebrew cask name (macOS GUI install)
#   tap          — Homebrew tap required for this package
#   pacman       — Arch Linux package name (official repos)
#   aur          — AUR package name; installed via yay (independent of pacman:)
#   winget       — winget package ID
#   bootstrap    — true if installed by .bootstrap.windows.ps1 before chezmoi runs (documentation only)
#   mise         — mise tool spec: "tool@version" (eg, "jq@latest", "python@3.13")
#   skip         — platforms to skip for mise: [darwin, linux, windows]
#   pip          — pip/UV package name
#   npm          — npm package name (future)
#
# Visual grouping via comment headers (core → gui → dev → app).
# Alphabetical by key within each group.
# Validated by .schemas/packages.schema.yaml via pre-commit.

